<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pengurus — SMA ABBS Surakarta</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* CSS Sama seperti file admin.html sebelumnya, dengan tambahan styling Tab dan Select */
    :root { --maroon: #7B1A1A; --maroon-mid: #A52020; --bg: #F4EFEE; --card: #FFFFFF; --text: #1C1C1E; --muted: #6B7280; --border: #E5D8D8; --radius: 16px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    #loginScreen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: var(--maroon); }
    .login-box { background: white; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 380px; text-align:center; }
    .login-box input { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; margin: 16px 0; outline: none; }
    .btn-login { width: 100%; padding: 14px; background: var(--maroon); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    
    #dashboard { display: none; }
    .dash-header { background: var(--maroon); padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .dash-body { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: white; padding: 6px; border-radius: 12px; border: 1px solid var(--border); width: max-content; }
    .tab-btn { padding: 8px 24px; border: none; background: transparent; border-radius: 8px; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; }
    .tab-btn.active { background: var(--maroon-soft); color: var(--maroon); }
    
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar input, .toolbar select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 13px; }
    
    .table-wrap { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
    th { background: #F9F3F3; color: var(--muted); font-size: 11px; text-transform: uppercase; padding: 12px 16px; text-align: left; }
    td { padding: 12px 16px; border-bottom: 1px solid #F5EEEE; }
    .badge-org { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; background: #F3F4F6; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2 style="color:var(--maroon)">Akses Pengurus</h2>
      <input type="password" id="adminPass" placeholder="Kata Sandi">
      <button class="btn-login" onclick="login()">Masuk Dashboard</button>
    </div>
  </div>

  <div id="dashboard">
    <div class="dash-header">
      <div><h2>Rekapitulasi</h2><span style="font-size:12px;opacity:0.8">SMA ABBS Surakarta</span></div>
      <div><button onclick="fetchData()" style="padding:8px 12px;border-radius:8px;border:none;cursor:pointer;">Refresh</button></div>
    </div>

    <div class="dash-body">
      <div class="tabs">
        <button class="tab-btn active" id="tabX" onclick="setTab('X')">Kelas X</button>
        <button class="tab-btn" id="tabXI" onclick="setTab('XI')">Kelas XI</button>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInp" placeholder="Cari nama..." oninput="renderTable()" style="flex:1; max-width:250px;">
        <select id="orgFilter" onchange="renderTable()">
          <option value="">Semua Organisasi</option>
          </select>
        <p style="font-size: 13px; color: var(--muted); margin-left: auto; align-self: center;">Total Terfilter: <strong id="totalCount">0</strong></p>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>No</th><th>Nama Siswa</th><th>Kelas</th><th>Waktu Daftar</th><th>Pilihan 1</th><th>Pilihan 2</th></tr>
          </thead>
          <tbody id="tBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzY99nHyZhORxWNEYGr5q_WsYdkXcFmYFpKY0Txzhcz5_BHKSvUFIWr_7Hm7A_KBxZw/exec'; 
  let dataKelasX = [], dataKelasXI = [], activeTab = 'X', currentPass = '';

  function login() { currentPass = document.getElementById('adminPass').value; fetchData(); }

  async function fetchData() {
    try {
      const res = await fetch(`${API_URL}?action=getAdmin&password=${currentPass}`);
      const data = await res.json();
      if(data.error) return alert(data.error);

      dataKelasX = data.siswaX || [];
      dataKelasXI = data.siswaXI || [];
      
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      
      extractOrgs();
      renderTable();
    } catch(e) { alert("Gagal memuat data"); }
  }

  function setTab(kelas) {
    activeTab = kelas;
    document.getElementById('tabX').className = 'tab-btn' + (kelas==='X'?' active':'');
    document.getElementById('tabXI').className = 'tab-btn' + (kelas==='XI'?' active':'');
    renderTable();
  }

  function extractOrgs() {
    const orgs = new Set();
    [...dataKelasX, ...dataKelasXI].forEach(r => {
      if(r[4]) orgs.add(r[4]); // Pilihan 1 (Kolom E / index 4)
      if(r[5] && r[5] !== '-') orgs.add(r[5]); // Pilihan 2 (Kolom F / index 5)
    });
    const filter = document.getElementById('orgFilter');
    filter.innerHTML = '<option value="">Semua Organisasi</option>';
    [...orgs].sort().forEach(o => filter.innerHTML += `<option value="${o}">${o}</option>`);
  }

  function renderTable() {
    const rawData = activeTab === 'X' ? dataKelasX : dataKelasXI;
    const q = document.getElementById('searchInp').value.toLowerCase();
    const fOrg = document.getElementById('orgFilter').value;
    
    // Asumsi Sheet: [0]No, [1]Nama, [2]Kelas, [3]NIS, [4]Pil1, [5]Pil2, [6]Waktu
    const filtered = rawData.filter(r => {
      const isRegistered = r[6]; // Cek apakah kolom Timestamp ada isinya
      if(!isRegistered) return false; // Abaikan siswa yang belum mendaftar

      const matchName = (r[1]||'').toLowerCase().includes(q);
      const matchOrg = !fOrg || r[4] === fOrg || r[5] === fOrg;
      return matchName && matchOrg;
    });

    // Urutkan berdasarkan waktu daftar terbaru
    filtered.sort((a,b) => new Date(b[6]) - new Date(a[6]));

    document.getElementById('totalCount').textContent = filtered.length;
    const tbody = document.getElementById('tBody'); tbody.innerHTML = '';
    
    filtered.forEach((r, i) => {
      const time = r[6] ? new Date(r[6]).toLocaleString('id-ID') : '-';
      tbody.innerHTML += `<tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><strong>${r[1]}</strong></td>
        <td>${r[2]}</td>
        <td style="color:var(--muted)">${time}</td>
        <td><span class="badge-org">${r[4] || '-'}</span></td>
        <td>${r[5] && r[5]!=='-' ? `<span class="badge-org">${r[5]}</span>` : '-'}</td>
      </tr>`;
    });
  }
</script>
</body>
</html>
