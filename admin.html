<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Pendaftaran Organisasi ABBS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8F9FA; }
    /* Animasi Loading Spinner */
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-6 text-gray-800">

  <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm transform transition-all">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-[#7B1A1A]">Akses Pengurus</h2>
        <p class="text-sm text-gray-500 mt-1">Masukkan kata sandi untuk melihat rekapitulasi.</p>
      </div>
      <input type="password" id="adminPass" class="w-full p-4 rounded-xl border border-gray-200 mb-4 outline-none focus:border-[#7B1A1A] focus:ring-2 focus:ring-[#7B1A1A]/20 transition" placeholder="Kata Sandi">
      <button id="btnLogin" onclick="login()" class="w-full bg-gradient-to-r from-[#7B1A1A] to-[#A52020] text-white p-4 rounded-xl font-bold hover:shadow-lg hover:scale-[1.02] transition-all flex justify-center items-center gap-2">
        Masuk Dashboard
      </button>
    </div>
  </div>

  <div id="dashboard" class="max-w-7xl mx-auto hidden animate-[fadeInUp_0.5s_ease-out]">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-[#7B1A1A] tracking-tight">Rekapitulasi Pendaftar</h1>
        <p class="text-sm text-gray-500 mt-1">Data ditarik langsung dari Google Sheets secara real-time.</p>
      </div>
      
      <div class="flex items-center gap-3 w-full md:w-auto">
        <button id="btnRefresh" onclick="fetchData(true)" class="flex-1 md:flex-none bg-white border border-gray-200 text-gray-700 px-5 py-2.5 rounded-xl shadow-sm hover:shadow-md hover:border-gray-300 transition flex items-center justify-center gap-2 font-medium">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          Segarkan Data
        </button>
        <button onclick="logout()" class="p-2.5 rounded-xl border border-red-100 bg-red-50 text-red-600 hover:bg-red-100 transition" title="Keluar">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </button>
      </div>
    </div>

    <div id="statCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8">
      </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead class="bg-gray-50 border-b border-gray-100 text-gray-600 uppercase text-xs tracking-wider">
            <tr>
              <th class="px-6 py-4 font-bold">Waktu Daftar</th>
              <th class="px-6 py-4 font-bold">Nama Siswa</th>
              <th class="px-6 py-4 font-bold">WhatsApp Siswa</th>
              <th class="px-6 py-4 font-bold">Nama Ortu/Wali</th>
              <th class="px-6 py-4 font-bold">Pilihan 1</th>
              <th class="px-6 py-4 font-bold">Pilihan 2</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-100">
            </tbody>
        </table>
      </div>
      
      <div id="tableStatus" class="p-10 text-center text-gray-500 hidden">
        Sedang memuat data pendaftar...
      </div>
    </div>
  </div>

  <script>
    // URL Web App Google Apps Script Anda
    const API_URL = 'https://script.google.com/macros/s/AKfycbwMbGr_jeASgMPn2MaPalsXlGKNDbKSe17aY0Oh-FFpdg4ZuT14IRThQpch2yabhTkK/exec';
    let currentPass = '';

    // Memicu tombol Masuk saat menekan Enter di input password
    document.getElementById('adminPass').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') login();
    });

    function login() {
      currentPass = document.getElementById('adminPass').value;
      if (!currentPass) {
        alert("Kata sandi tidak boleh kosong!");
        return;
      }
      fetchData(false);
    }

    function logout() {
      currentPass = '';
      document.getElementById('adminPass').value = '';
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('loginModal').classList.remove('hidden');
      document.getElementById('tableBody').innerHTML = '';
      document.getElementById('statCards').innerHTML = '';
    }

    async function fetchData(isRefresh) {
      // Setup UI Loading State
      const btn = isRefresh ? document.getElementById('btnRefresh') : document.getElementById('btnLogin');
      const originalText = btn.innerHTML;
      
      btn.innerHTML = `<svg class="spinner w-5 h-5 text-current" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ${isRefresh ? 'Menyegarkan...' : 'Memverifikasi...'}`;
      btn.disabled = true;
      document.body.style.cursor = 'wait';
      
      if(isRefresh) {
        document.getElementById('tableBody').innerHTML = '';
        document.getElementById('tableStatus').textContent = 'Menyegarkan data...';
        document.getElementById('tableStatus').classList.remove('hidden');
      }

      try {
        // Ambil data dari server
        const response = await fetch(`${API_URL}?action=getAdmin&password=${encodeURIComponent(currentPass)}`);
        const data = await response.json();

        // Cek jika password salah
        if (data.error) {
          alert(data.error);
          document.getElementById('adminPass').value = '';
          document.getElementById('adminPass').focus();
        } else {
          // Sukses Login
          document.getElementById('loginModal').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          renderData(data.pendaftar);
        }
      } catch (error) {
        console.error("Fetch error:", error);
        alert("Gagal terhubung ke server. Periksa koneksi internet Anda.");
        if(isRefresh) document.getElementById('tableStatus').textContent = 'Gagal memuat data.';
      } finally {
        // Kembalikan UI State
        btn.innerHTML = originalText;
        btn.disabled = false;
        document.body.style.cursor = 'default';
      }
    }

    function renderData(rows) {
      const tbody = document.getElementById('tableBody');
      const statusMsg = document.getElementById('tableStatus');
      const statContainer = document.getElementById('statCards');
      
      tbody.innerHTML = '';
      statContainer.innerHTML = '';
      const stats = {};
      let totalPendaftar = 0;

      // Cek apakah ada data pendaftar
      if (!rows || rows.length === 0) {
        statusMsg.textContent = 'Belum ada data pendaftar.';
        statusMsg.classList.remove('hidden');
        return;
      }
      
      statusMsg.classList.add('hidden');

      // Looping data dari bawah ke atas (Terbaru di atas)
      // Asumsi format array: [Timestamp, Nama, WA, Nama_Ortu, WA_Ortu, Pilihan_1, Pilihan_2]
      for (let i = rows.length - 1; i >= 0; i--) {
        const row = rows[i];
        // Lewati jika baris kosong
        if(!row[1]) continue; 
        
        totalPendaftar++;

        // Hitung Statistik Organisasi
        const p1 = row[5], p2 = row[6];
        if(p1 && p1 !== '-') stats[p1] = (stats[p1] || 0) + 1;
        if(p2 && p2 !== '-') stats[p2] = (stats[p2] || 0) + 1;

        // Format Waktu (Contoh: 12 Jun 2026, 14:30)
        let formattedDate = '-';
        if (row[0]) {
          const d = new Date(row[0]);
          formattedDate = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // Tautan WhatsApp (Menghilangkan spasi/karakter aneh jika ada)
        const waSiswa = row[2] ? row[2].toString().replace(/\D/g, '') : '';

        // Render Baris Tabel
        tbody.innerHTML += `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 text-gray-500">${formattedDate}</td>
            <td class="px-6 py-4 font-medium text-gray-900">${row[1]}</td>
            <td class="px-6 py-4">
              <a href="https://wa.me/${waSiswa}" target="_blank" class="inline-flex items-center gap-1.5 text-green-600 hover:text-green-700 hover:underline font-medium">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824z"/></svg>
                ${row[2]}
              </a>
            </td>
            <td class="px-6 py-4 text-gray-700">${row[3]}</td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center px-2.5 py-1 rounded-md bg-red-50 text-red-700 font-semibold border border-red-100">
                ${row[5] || '-'}
              </span>
            </td>
            <td class="px-6 py-4">
              ${row[6] && row[6] !== '-' ? `
                <span class="inline-flex items-center px-2.5 py-1 rounded-md bg-gray-50 text-gray-700 font-semibold border border-gray-200">
                  ${row[6]}
                </span>
              ` : '<span class="text-gray-400">-</span>'}
            </td>
          </tr>
        `;
      }

      // Render Total Pendaftar Keseluruhan
      statContainer.innerHTML += `
        <div class="bg-gradient-to-br from-[#7B1A1A] to-[#A52020] p-5 rounded-2xl border border-red-800 shadow-md text-white relative overflow-hidden">
          <div class="relative z-10">
            <p class="text-sm text-red-100 font-semibold mb-1">Total Pendaftar</p>
            <p class="text-3xl font-extrabold">${totalPendaftar} <span class="text-sm font-normal opacity-80">Siswa</span></p>
          </div>
          <svg class="absolute -bottom-4 -right-4 w-24 h-24 text-white opacity-10" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path></svg>
        </div>
      `;

      // Render Stats per Organisasi (Diurutkan berdasarkan yang terbanyak)
      const sortedStats = Object.keys(stats).sort((a, b) => stats[b] - stats[a]);
      
      sortedStats.forEach(org => {
        statContainer.innerHTML += `
          <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition">
            <p class="text-sm text-gray-500 font-semibold mb-1 truncate" title="${org}">${org}</p>
            <p class="text-2xl font-bold text-[#7B1A1A]">${stats[org]} <span class="text-sm text-gray-400 font-normal">Peminat</span></p>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
